<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Storm Council — Zeus SC Monogram</title>
  <desc id="desc">A premium vector logo featuring an abstract Zeus profile, lightning bolt, and SC monogram.</desc>

  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF4B0"/>
      <stop offset="38%" stop-color="#D8A72B"/>
      <stop offset="72%" stop-color="#8A5613"/>
      <stop offset="100%" stop-color="#F3CA5C"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#18233B"/>
      <stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Transparent-background crest -->
  <g filter="url(#shadow)">
    <circle cx="512" cy="478" r="360" fill="url(#ink)" stroke="url(#gold)" stroke-width="20"/>
    <circle cx="512" cy="478" r="325" fill="none" stroke="#2F3B55" stroke-width="5"/>
  </g>

  <!-- Greek key accents -->
  <g fill="none" stroke="url(#gold)" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M276 252h52v34h-25v26h25v34h-52"/>
    <path d="M748 252h-52v34h25v26h-25v34h52"/>
  </g>

  <!-- Abstract Zeus profile -->
  <g fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round">
    <!-- hair / crown -->
    <path stroke-width="24" d="M394 316c58-74 164-97 244-43 28 19 49 45 62 76"/>
    <path stroke-width="18" d="M390 348c41-34 83-46 130-44 39 2 78 15 110 39"/>
    <path stroke-width="15" d="M430 272l24-48 18 42 38-38 19 48 43-26 3 49 48-8-18 43"/>
    <!-- face silhouette -->
    <path stroke-width="26" d="M626 334c31 31 44 75 37 111-5 24-24 44-51 53l-7 38 35 26-49 18-19 51-32-35-39 26-5-52-47-23 35-39-9-47 47 9 30-36 41 24"/>
    <!-- eyebrow, eye, nose, beard -->
    <path stroke-width="16" d="M559 384c27-13 57-11 81 4"/>
    <path stroke-width="14" d="M580 418c16 9 30 10 43 2"/>
    <path stroke-width="17" d="M613 433l-13 42 31 11"/>
    <path stroke-width="18" d="M578 500c24 15 48 18 70 5"/>
    <path stroke-width="22" d="M554 528c8 58 44 99 91 123"/>
    <path stroke-width="18" d="M534 548c-4 46 13 89 51 125"/>
    <path stroke-width="15" d="M512 567c-12 39-4 83 28 119"/>
    <!-- neck / cloak -->
    <path stroke-width="24" d="M484 642c-38 17-69 45-90 80"/>
    <path stroke-width="24" d="M644 654c41 19 72 47 93 81"/>
  </g>

  <!-- Lightning -->
  <path d="M348 245 455 245 407 353 495 353 321 601 360 453 275 453Z"
        fill="url(#gold)" stroke="#FFF6C9" stroke-width="5" stroke-linejoin="round"/>

  <!-- Monogram shield -->
  <path d="M276 677 512 626 748 677 715 852 512 926 309 852Z"
        fill="#0A101D" stroke="url(#gold)" stroke-width="18" stroke-linejoin="round"/>
  <path d="M303 698 512 654 721 698" fill="none" stroke="#2A3854" stroke-width="10"/>

  <!-- SC monogram -->
  <g fill="none" stroke="url(#gold)" stroke-width="35" stroke-linecap="round" stroke-linejoin="round">
    <path d="M466 730c-22-19-57-28-91-16-35 12-53 42-46 71 8 35 43 47 84 52 31 4 43 12 43 31 0 21-20 36-47 36-28 0-54-10-74-28"/>
    <path d="M692 748c-20-20-47-30-78-30-57 0-98 40-98 95 0 55 41 95 98 95 31 0 58-10 78-30"/>
  </g>

  <!-- small bolt -->
  <path d="M506 777h34l-21 47h34l-60 77 18-53h-30z" fill="#FFF1A2"/>

  <!-- wordmark -->
  <g fill="#F8E6A6" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle">
    <text x="512" y="968" font-size="36" letter-spacing="10">STORM COUNCIL</text>
  </g>
</svg>
