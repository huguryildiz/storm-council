<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128">
  <defs>
    <!-- Dark council chamber, lit subtly from the top vertex -->
    <linearGradient id="sc-pent" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#3D2E97"/>
      <stop offset="100%" stop-color="#221862"/>
    </linearGradient>
    <radialGradient id="sc-core" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#6E58E4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6E58E4" stop-opacity="0"/>
    </radialGradient>
    <filter id="sc-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    Outer form: point-top pentagon, center (32,33), R=29, rounded corners.
    Vertices: top(32,4) (59.58,24.04) (49.05,56.46) (14.95,56.46) (4.42,24.04)
    Fill + same-color round-join stroke softens the corners.
  -->
  <polygon points="32,4 59.58,24.04 49.05,56.46 14.95,56.46 4.42,24.04"
           fill="url(#sc-pent)" stroke="#221862" stroke-width="5"
           stroke-linejoin="round"/>
  <!-- inner rim highlight for depth -->
  <polygon points="32,4 59.58,24.04 49.05,56.46 14.95,56.46 4.42,24.04"
           fill="none" stroke="#8A77E8" stroke-width="1" stroke-opacity="0.35"
           stroke-linejoin="round" transform="translate(32,33) scale(0.86) translate(-32,-33)"/>

  <!-- soft glow at the storm core -->
  <circle cx="32" cy="33" r="16" fill="url(#sc-core)"/>

  <!-- Inner ring: 5 spokes from the five perspectives into the core -->
  <g stroke="#8B79E8" stroke-opacity="0.55" stroke-width="1.2" stroke-linecap="round">
    <line x1="32" y1="18"    x2="32" y2="27"/>
    <line x1="46.27" y1="28.36" x2="38" y2="31.5"/>
    <line x1="40.82" y1="45.14" x2="35" y2="37.5"/>
    <line x1="23.18" y1="45.14" x2="29" y2="37.5"/>
    <line x1="17.73" y1="28.36" x2="26" y2="31.5"/>
  </g>

  <!-- Five research-perspective nodes -->
  <g fill="#E7E2FF" filter="url(#sc-soft)">
    <circle cx="32"    cy="18"    r="2.5"/>
    <circle cx="46.27" cy="28.36" r="2.5"/>
    <circle cx="40.82" cy="45.14" r="2.5"/>
    <circle cx="23.18" cy="45.14" r="2.5"/>
    <circle cx="17.73" cy="28.36" r="2.5"/>
  </g>

  <!-- Contradiction: a thin broken link between two adjacent nodes (kept quiet) -->
  <g stroke="#D8786A" stroke-opacity="0.85" stroke-width="1.1" stroke-linecap="round" fill="none">
    <path d="M25.5,45.14 L28.6,45.7 L30,44.4"/>
    <path d="M34,44.6 L35.4,45.8 L38.5,45.14"/>
  </g>

  <!-- Storm eye: two negative-space vortex arms swirling around a calm core -->
  <g stroke="#F2EEFF" stroke-width="2.4" stroke-linecap="round" fill="none">
    <path d="M30.6,25.8 C25.4,26.6 24.2,32 28.8,33.4"/>
    <path d="M33.4,40.2 C38.6,39.4 39.8,34 35.2,32.6"/>
  </g>

  <!-- Verifiable core: a tiny check (quality gate) at the calm center -->
  <path d="M30.3,33.1 L31.6,34.5 L34.1,31.4"
        stroke="#FFD27A" stroke-width="1.2" stroke-linecap="round"
        stroke-linejoin="round" fill="none"/>
</svg>
