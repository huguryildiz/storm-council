<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252 68" width="252" height="68">
  <defs>
    <!-- Icon background (deep space) -->
    <radialGradient id="bg-l" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#080C14"/>
    </radialGradient>

    <!-- Bolt gradient -->
    <linearGradient id="bolt-l" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="20%"  stop-color="#FEF3C7"/>
      <stop offset="60%"  stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>

    <!-- Bolt glow -->
    <filter id="bolt-glow-l" x="-100%" y="-60%" width="300%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="g-wide"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="g-tight"/>
      <feMerge>
        <feMergeNode in="g-wide"/>
        <feMergeNode in="g-tight"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pentagon edge glow -->
    <filter id="pent-glow-l" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Node glow -->
    <filter id="node-glow-l" x="-180%" y="-180%" width="460%" height="460%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ambient gold aura -->
    <radialGradient id="aura-l" cx="50%" cy="14%" r="45%">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <!-- "Storm" text gradient -->
    <linearGradient id="grad-storm" x1="72" y1="0" x2="160" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>

    <!-- "COUNCIL" text gradient -->
    <linearGradient id="grad-council" x1="73" y1="0" x2="168" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!--
    Icon: 75% of 64x64 original, at (10,10).
    Pentagon vertices same as icon.svg (in 64x64 space).
  -->
  <g transform="translate(10,10) scale(0.75)">
    <rect width="64" height="64" rx="13" fill="url(#bg-l)"/>
    <rect width="64" height="64" rx="13" fill="url(#aura-l)"/>

    <!-- Pentagon chamber -->
    <polygon
      points="32,9 10.1,24.9 18.5,50.6 45.5,50.6 53.9,24.9"
      fill="#1E3A8A" fill-opacity="0.10" stroke="none"/>
    <polygon
      points="32,9 10.1,24.9 18.5,50.6 45.5,50.6 53.9,24.9"
      fill="none"
      stroke="#3B82F6" stroke-width="1.9" stroke-opacity="0.85"
      filter="url(#pent-glow-l)"/>

    <!-- Zeus bolt — tip at (32,9) -->
    <path
      d="M32,9 L43,30 L36,30 L44,50 L21,31 L29,31 Z"
      fill="url(#bolt-l)"
      filter="url(#bolt-glow-l)"/>

    <!-- Specular highlight -->
    <path
      d="M32,9 L39,27 L35,27 L42,47"
      stroke="rgba(255,255,255,0.45)" stroke-width="0.9"
      fill="none" stroke-linecap="round"/>

    <!-- Agent nodes -->
    <circle cx="32"   cy="9"    r="3.2" fill="#FDE68A" filter="url(#node-glow-l)" opacity="0.95"/>
    <circle cx="10.1" cy="24.9" r="2.5" fill="#93C5FD" filter="url(#node-glow-l)" opacity="0.80"/>
    <circle cx="18.5" cy="50.6" r="2.5" fill="#93C5FD" filter="url(#node-glow-l)" opacity="0.80"/>
    <circle cx="45.5" cy="50.6" r="2.5" fill="#93C5FD" filter="url(#node-glow-l)" opacity="0.80"/>
    <circle cx="53.9" cy="24.9" r="2.5" fill="#93C5FD" filter="url(#node-glow-l)" opacity="0.80"/>
  </g>

  <!-- "Storm" — Palatino serif, bold -->
  <text
    x="72" y="37"
    font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif"
    font-size="26" font-weight="700"
    fill="url(#grad-storm)"
    letter-spacing="-0.5">Storm</text>

  <!-- "COUNCIL" — Palatino serif, light-weight, spaced -->
  <text
    x="73" y="57"
    font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif"
    font-size="13" font-weight="400"
    fill="url(#grad-council)"
    letter-spacing="3.5">COUNCIL</text>
</svg>
